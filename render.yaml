services:
  - type: web
    name: mia-social-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y libraqm-dev fonts-freefont-ttf 2>/dev/null || true; pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: APP_ENV
        value: development
